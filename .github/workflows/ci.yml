name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pipeline_db
          POSTGRES_USER: pipeline
          POSTGRES_PASSWORD: password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Tidy
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Unit tests (no Kafka required)
        run: go test ./internal/... -race -count=1 -timeout 60s

      - name: Build producer
        run: go build -o /dev/null ./cmd/producer

      - name: Build processor
        run: go build -o /dev/null ./cmd/processor

      - name: Build api
        run: go build -o /dev/null ./cmd/api

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
